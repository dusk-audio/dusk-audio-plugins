name: TapeMachine 2 Release (DPF)

# Builds + releases the DPF-based TapeMachine 2 (tape_machine_2) plugin.
#
# TapeMachine 2 uses DPF (DISTRHO Plugin Framework), NOT JUCE — it is built by
# its own standalone CMake under plugins/TapeMachine/dpf-plugin and does not go
# through the JUCE pipeline in build.yml. DPF + DPF-Widgets are checked out next
# to the repo (as -DDPF_PATH / -DDPFWIDGETS_PATH overrides) exactly like the
# existing dpf-au-test.yml.
#
# Triggers:
#   - push tag 'tapemachine-2-v*'   -> full build + GitHub release (distinct from
#                                       the JUCE 'tapemachine-v*' trigger in build.yml)
#   - workflow_dispatch             -> build only, no release
#   - pull_request touching the DPF plugin / shared-dpf -> build-only smoke test
on:
  push:
    tags:
      - 'tapemachine-2-v*'
  workflow_dispatch:
  pull_request:
    paths:
      - 'plugins/TapeMachine/dpf-plugin/**'
      - 'plugins/TapeMachine/core/**'
      - 'plugins/shared-dpf/**'
      - '.github/workflows/tapemachine2-release.yml'

# AU subtype/manufacturer codes come from DistrhoPluginInfo.h:
#   DISTRHO_PLUGIN_UNIQUE_ID = DsTM   DISTRHO_PLUGIN_BRAND_ID = Dusk
env:
  PLUGIN_DIR: plugins/TapeMachine/dpf-plugin
  PLUGIN_BASE: tape_machine_2   # dpf_add_plugin() base name -> build/bin/tape_machine_2.{vst3,clap,lv2,component}
  AU_TYPE: aufx
  AU_SUBTYPE: DsTM
  AU_MANUFACTURER: Dusk

jobs:
  # -------------------------------------------------------------------------
  # Resolve the version + whether this run should publish a release.
  # -------------------------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_release: ${{ steps.parse.outputs.is_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse version + release flag
        id: parse
        shell: bash
        run: |
          CMAKE_VERSION=$(grep -m1 'project(TapeMachine2DPF' "${PLUGIN_DIR}/CMakeLists.txt" \
            | sed -E 's/.*VERSION[[:space:]]+([0-9.]+).*/\1/')
          if [[ "$GITHUB_REF" == refs/tags/tapemachine-2-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/tapemachine-2-v}"
            IS_RELEASE=true
            # Guard: the tag must match the CMake project version (ignoring any
            # -beta/-rc suffix on the tag), otherwise the release would ship
            # binaries whose embedded version disagrees with the tag.
            TAG_BASE="${VERSION%%-*}"
            if [ -z "$CMAKE_VERSION" ] || [ "$TAG_BASE" != "$CMAKE_VERSION" ]; then
              echo "::error::Tag version '${VERSION}' (base '${TAG_BASE}') does not match CMake project version '${CMAKE_VERSION:-<not found>}' in ${PLUGIN_DIR}/CMakeLists.txt"
              exit 1
            fi
          else
            # Non-tag runs (dispatch / PR): use the CMake project version.
            VERSION="$CMAKE_VERSION"
            [ -n "$VERSION" ] || VERSION="0.0.0"
            IS_RELEASE=false
          fi
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$VERSION is_release=$IS_RELEASE"

  # -------------------------------------------------------------------------
  # Linux: VST3 + CLAP + LV2 (AU is macOS-only). ubuntu-latest.
  # -------------------------------------------------------------------------
  build-linux:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout plugins repo
        uses: actions/checkout@v4

      - name: Checkout DPF
        uses: actions/checkout@v4
        with:
          repository: DISTRHO/DPF
          ref: 4238e1c7f0351bbe488d79f0899c540543ac7583
          path: DPF
          submodules: recursive

      - name: Checkout DPF-Widgets
        uses: actions/checkout@v4
        with:
          repository: DISTRHO/DPF-Widgets
          ref: 730da6397904da66d99667c1cb30fc77fc3d794a
          path: DPF-Widgets
          submodules: recursive

      - name: Install Linux dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # DPF's OpenGL (DGL) UI resolves these via pkg-config in
          # Makefile.base.mk: gl (mesa), x11, dbus-1 (optional file browser).
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            ninja-build \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libdbus-1-dev

      - name: Configure
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDUSK_DPF_INSTALL_LOCAL=OFF \
            -DDPF_PATH="${GITHUB_WORKSPACE}/DPF" \
            -DDPFWIDGETS_PATH="${GITHUB_WORKSPACE}/DPF-Widgets"

      - name: Build (VST3 + CLAP + LV2)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          cmake --build build --config Release -j"$(nproc)" \
            --target "${PLUGIN_BASE}-vst3" "${PLUGIN_BASE}-clap" "${PLUGIN_BASE}-lv2"

      - name: Package
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          # Asset names must match the website layout's generated links:
          # .../download/tapemachine-2-v<version>/tapemachine-2-<os>.zip
          STAGE="tapemachine-2-linux"
          mkdir -p "${STAGE}/VST3" "${STAGE}/CLAP" "${STAGE}/LV2"
          cp -r "build/bin/${PLUGIN_BASE}.vst3" "${STAGE}/VST3/"
          cp    "build/bin/${PLUGIN_BASE}.clap" "${STAGE}/CLAP/"
          cp -r "build/bin/${PLUGIN_BASE}.lv2"  "${STAGE}/LV2/"
          cp ../../../LICENSE "${STAGE}/LICENSE"
          cp ../../shared-dpf/THIRD_PARTY_LICENSES.md "${STAGE}/THIRD_PARTY_LICENSES.md"
          echo "=== staged ==="
          find "${STAGE}" -maxdepth 2
          zip -r "${STAGE}.zip" "${STAGE}"
          tar -czf "${STAGE}.tar.gz" "${STAGE}"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tapemachine-2-linux
          path: |
            ${{ env.PLUGIN_DIR }}/tapemachine-2-linux.zip
            ${{ env.PLUGIN_DIR }}/tapemachine-2-linux.tar.gz
          if-no-files-found: error
          retention-days: 30

  # -------------------------------------------------------------------------
  # macOS: AU + VST3 + CLAP + LV2, with `auval` as a hard gate on the AU.
  # -------------------------------------------------------------------------
  build-macos:
    needs: setup
    runs-on: macos-14  # ARM64 (M1)
    timeout-minutes: 30
    steps:
      - name: Checkout plugins repo
        uses: actions/checkout@v4

      - name: Checkout DPF
        uses: actions/checkout@v4
        with:
          repository: DISTRHO/DPF
          ref: 4238e1c7f0351bbe488d79f0899c540543ac7583
          path: DPF
          submodules: recursive

      - name: Checkout DPF-Widgets
        uses: actions/checkout@v4
        with:
          repository: DISTRHO/DPF-Widgets
          ref: 730da6397904da66d99667c1cb30fc77fc3d794a
          path: DPF-Widgets
          submodules: recursive

      - name: Install Ninja
        run: brew install ninja

      - name: Configure
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDUSK_DPF_INSTALL_LOCAL=OFF \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="10.15" \
            -DDPF_PATH="${GITHUB_WORKSPACE}/DPF" \
            -DDPFWIDGETS_PATH="${GITHUB_WORKSPACE}/DPF-Widgets"

      - name: Build (AU + VST3 + CLAP + LV2)
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          cmake --build build --config Release -j"$(sysctl -n hw.ncpu)" \
            --target "${PLUGIN_BASE}-au" "${PLUGIN_BASE}-vst3" \
                     "${PLUGIN_BASE}-clap" "${PLUGIN_BASE}-lv2"

      - name: Locate AU component
        id: findau
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          COMP=$(find build/bin -name '*.component' -type d | head -1)
          if [ -z "$COMP" ]; then
            echo "::error::No .component was built"
            find build -maxdepth 3 -type d
            exit 1
          fi
          echo "component=${COMP}" >> "$GITHUB_OUTPUT"
          echo "Found AU: ${COMP}"
          plutil -p "${COMP}/Contents/Info.plist" || cat "${COMP}/Contents/Info.plist"

      - name: Verify universal binaries and deployment target
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          binaries=(
            "build/bin/${PLUGIN_BASE}.component/Contents/MacOS/${PLUGIN_BASE}"
            "build/bin/${PLUGIN_BASE}.vst3/Contents/MacOS/${PLUGIN_BASE}"
            "build/bin/${PLUGIN_BASE}.clap/Contents/MacOS/${PLUGIN_BASE}"
            "build/bin/${PLUGIN_BASE}.lv2/${PLUGIN_BASE}.dylib"
          )
          for binary in "${binaries[@]}"; do
            test -f "$binary"
            archs=$(lipo -archs "$binary")
            echo "$binary: $archs"
            grep -qw arm64 <<<"$archs"
            grep -qw x86_64 <<<"$archs"
            vtool -show-build "$binary" | grep -q "minos 10.15"
          done

      - name: Install component for auval
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          mkdir -p "$HOME/Library/Audio/Plug-Ins/Components"
          cp -R "${{ steps.findau.outputs.component }}" "$HOME/Library/Audio/Plug-Ins/Components/"
          killall -9 AudioComponentRegistrar 2>/dev/null || true

      - name: Validate with auval (gate)
        run: |
          echo "--- registered audio-effect components matching Dusk ---"
          auval -a | grep -i -E "dusk|tape|DsTM" || echo "(not listed yet; validating by code)"
          echo "--- auval -v ${AU_TYPE} ${AU_SUBTYPE} ${AU_MANUFACTURER} ---"
          auval -v "${AU_TYPE}" "${AU_SUBTYPE}" "${AU_MANUFACTURER}"

      - name: Require Apple signing configuration for releases
        if: ${{ needs.setup.outputs.is_release == 'true' && vars.MACOS_SIGNING_ENABLED != 'true' }}
        run: |
          echo "::error::Production releases require MACOS_SIGNING_ENABLED=true and Apple signing/notarization secrets"
          exit 1

      - name: Import code-signing certificate
        if: ${{ vars.MACOS_SIGNING_ENABLED == 'true' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          test -n "$MACOS_CERTIFICATE"
          test -n "$MACOS_CERTIFICATE_PWD"
          test -n "$KEYCHAIN_PASSWORD"
          KEYCHAIN_PATH="$RUNNER_TEMP/tm2-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/tm2-certificate.p12"
          security import "$RUNNER_TEMP/tm2-certificate.p12" -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm "$RUNNER_TEMP/tm2-certificate.p12"

      - name: Sign macOS plugin bundles
        if: ${{ vars.MACOS_SIGNING_ENABLED == 'true' }}
        working-directory: ${{ env.PLUGIN_DIR }}
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          test -n "$MACOS_SIGNING_IDENTITY"
          for plugin in \
            "build/bin/${PLUGIN_BASE}.component" \
            "build/bin/${PLUGIN_BASE}.vst3" \
            "build/bin/${PLUGIN_BASE}.clap" \
            "build/bin/${PLUGIN_BASE}.lv2"; do
            codesign --force --deep --sign "$MACOS_SIGNING_IDENTITY" \
              --options runtime --timestamp "$plugin"
            codesign --verify --deep --strict --verbose=2 "$plugin"
          done

      - name: Notarize macOS release bundles
        if: ${{ needs.setup.outputs.is_release == 'true' }}
        working-directory: ${{ env.PLUGIN_DIR }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_PASSWORD"
          test -n "$APPLE_TEAM_ID"
          rm -rf notarize-staging
          mkdir notarize-staging
          cp -R "build/bin/${PLUGIN_BASE}.component" notarize-staging/
          cp -R "build/bin/${PLUGIN_BASE}.vst3" notarize-staging/
          cp -R "build/bin/${PLUGIN_BASE}.clap" notarize-staging/
          cp -R "build/bin/${PLUGIN_BASE}.lv2" notarize-staging/
          ditto -c -k --keepParent notarize-staging notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "build/bin/${PLUGIN_BASE}.component"
          xcrun stapler staple "build/bin/${PLUGIN_BASE}.vst3"
          xcrun stapler staple "build/bin/${PLUGIN_BASE}.clap"

      - name: Package
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          # Asset name must match the website layout's generated link
          STAGE="tapemachine-2-macos"
          mkdir -p "${STAGE}/AU" "${STAGE}/VST3" "${STAGE}/CLAP" "${STAGE}/LV2"
          cp -r "build/bin/${PLUGIN_BASE}.component" "${STAGE}/AU/"
          cp -r "build/bin/${PLUGIN_BASE}.vst3"      "${STAGE}/VST3/"
          cp -r "build/bin/${PLUGIN_BASE}.clap"      "${STAGE}/CLAP/"
          cp -r "build/bin/${PLUGIN_BASE}.lv2"       "${STAGE}/LV2/"
          cp ../../../LICENSE "${STAGE}/LICENSE"
          cp ../../shared-dpf/THIRD_PARTY_LICENSES.md "${STAGE}/THIRD_PARTY_LICENSES.md"
          echo "=== staged ==="
          find "${STAGE}" -maxdepth 2 -type d
          # ditto preserves macOS bundle metadata better than zip
          ditto -c -k --keepParent "${STAGE}" "${STAGE}.zip"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tapemachine-2-macos
          path: ${{ env.PLUGIN_DIR }}/tapemachine-2-macos.zip
          if-no-files-found: error
          retention-days: 30

  # -------------------------------------------------------------------------
  # Windows: intentionally NOT wired yet.
  #
  # build.yml has an established JUCE Windows pattern (ilammy/msvc-dev-cmd@v1 +
  # Ninja + cl), and DPF does support VST3/CLAP on Windows. But there is no
  # proven DPF-on-Windows CI in this repo to model on, and the DPF OpenGL (DGL)
  # UI has not been build-verified here under MSVC. Rather than ship an
  # untested job, this is left as a stub. To enable: uncomment, mirror the
  # build-linux steps, drop the LV2 target (DPF LV2 on Windows is fiddly, and
  # build.yml also disables LV2 on Windows), and package VST3 + CLAP.
  #
  # build-windows:
  #   needs: setup
  #   runs-on: windows-latest
  #   timeout-minutes: 60
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/checkout@v4
  #       with: { repository: DISTRHO/DPF, path: DPF, submodules: recursive }
  #     - uses: actions/checkout@v4
  #       with: { repository: DISTRHO/DPF-Widgets, path: DPF-Widgets, submodules: recursive }
  #     - uses: ilammy/msvc-dev-cmd@v1
  #     - name: Configure
  #       working-directory: ${{ env.PLUGIN_DIR }}
  #       run: >
  #         cmake -B build -G Ninja
  #         -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl
  #         -DCMAKE_BUILD_TYPE=Release -DDUSK_DPF_INSTALL_LOCAL=OFF
  #         -DDPF_PATH="${{ github.workspace }}/DPF"
  #         -DDPFWIDGETS_PATH="${{ github.workspace }}/DPF-Widgets"
  #     - name: Build
  #       working-directory: ${{ env.PLUGIN_DIR }}
  #       run: cmake --build build --config Release --target tape_machine_2-vst3 tape_machine_2-clap

  # -------------------------------------------------------------------------
  # Release: only on a tapemachine-2-v* tag. Attaches the built archives.
  # -------------------------------------------------------------------------
  release:
    needs: [setup, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: needs.setup.outputs.is_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout repository (for tag message)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Assemble release notes
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Changelog from the annotated tag message (skip first line = title).
          TAG_MESSAGE=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || echo "")
          CHANGELOG=$(echo "$TAG_MESSAGE" | tail -n +2 | sed '/^$/d; 1{/^$/d}')
          {
            echo "## TapeMachine 2 v${VERSION}"
            echo ""
            if [ -n "$CHANGELOG" ]; then
              echo "$CHANGELOG"
              echo ""
            fi
            echo "### Installation"
            echo ""
            echo "Each zip contains \`VST3/\`, \`CLAP/\`, \`LV2/\` and (macOS only) \`AU/\` folders."
            echo ""
            echo "**Linux (x86_64):**"
            echo "- VST3: copy \`VST3/tape_machine_2.vst3\` to \`~/.vst3/\`"
            echo "- CLAP: copy \`CLAP/tape_machine_2.clap\` to \`~/.clap/\`"
            echo "- LV2: copy \`LV2/tape_machine_2.lv2\` to \`~/.lv2/\`"
            echo ""
            echo "**macOS (universal — arm64 runner build):**"
            echo "- AU: copy \`AU/tape_machine_2.component\` to \`~/Library/Audio/Plug-Ins/Components/\`"
            echo "- VST3: copy \`VST3/tape_machine_2.vst3\` to \`~/Library/Audio/Plug-Ins/VST3/\`"
            echo "- CLAP: copy \`CLAP/tape_machine_2.clap\` to \`~/Library/Audio/Plug-Ins/CLAP/\`"
            echo "- LV2: copy \`LV2/tape_machine_2.lv2\` to \`~/Library/Audio/Plug-Ins/LV2/\`"
            echo ""
            echo "> macOS AU, VST3, and CLAP bundles are Developer ID signed and Apple-notarized. The LV2 bundle is Developer ID signed."
          } > release_body.md
          echo "=== collected artifacts ==="
          find dist -type f \( -name '*.zip' -o -name '*.tar.gz' \)
          find dist -type f \( -name '*.zip' -o -name '*.tar.gz' \) -print0 \
            | sort -z | xargs -0 shasum -a 256 > dist/SHA256SUMS

      - name: Publish Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1 (v0.1.15)
        with:
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          body_path: release_body.md
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
